<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POD Hạnh Trần — Weekly Performance Dashboard W11</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; color: #1a1a2e; }

.header { background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%); color: white; padding: 28px 40px; display: flex; justify-content: space-between; align-items: flex-start; }
.header h1 { font-size: 26px; font-weight: 700; }
.header .subtitle { font-size: 13px; opacity: 0.75; margin-top: 4px; }
.header .date-badge { display: inline-block; background: rgba(255,255,255,0.15); padding: 4px 14px; border-radius: 20px; font-size: 12px; margin-top: 8px; }
.header-right { text-align: right; font-size: 12px; opacity: 0.7; }

.tabs-bar { display: flex; background: #1a1a2e; padding: 0 40px; border-bottom: 2px solid #0f3460; flex-wrap: wrap; }
.tab-btn { padding: 12px 22px; color: rgba(255,255,255,0.55); cursor: pointer; font-size: 13px; font-weight: 600; border-bottom: 3px solid transparent; transition: all 0.2s; border: none; background: none; }
.tab-btn:hover { color: rgba(255,255,255,0.9); }
.tab-btn.active { color: #e94560; border-bottom-color: #e94560; }

.container { max-width: 1440px; margin: 0 auto; padding: 24px 20px; }
.tab-content { display: none; }
.tab-content.active { display: block; }

.kpi-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
.kpi-card { background: white; border-radius: 12px; padding: 20px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); border-top: 4px solid #0f3460; }
.kpi-card.green { border-top-color: #10b981; }
.kpi-card.red { border-top-color: #ef4444; }
.kpi-card.orange { border-top-color: #f59e0b; }
.kpi-card .label { font-size: 11px; color: #888; text-transform: uppercase; letter-spacing: 0.6px; font-weight: 700; }
.kpi-card .value { font-size: 30px; font-weight: 800; margin: 6px 0 4px; color: #1a1a2e; }
.kpi-card .sub { font-size: 12px; color: #666; }
.kpi-card .pct { font-size: 13px; font-weight: 700; margin-top: 4px; }
.kpi-card .pct.pos { color: #10b981; }
.kpi-card .pct.neg { color: #ef4444; }
.kpi-card .pct.warn { color: #f59e0b; }

.progress-bar { height: 8px; background: #e5e7eb; border-radius: 4px; margin-top: 10px; overflow: hidden; }
.progress-fill { height: 100%; border-radius: 4px; transition: width 0.6s; }
.fill-green { background: linear-gradient(90deg, #10b981, #34d399); }
.fill-orange { background: linear-gradient(90deg, #f59e0b, #fbbf24); }
.fill-red { background: linear-gradient(90deg, #ef4444, #f87171); }

.card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); margin-bottom: 20px; }
.card h3 { font-size: 15px; font-weight: 700; margin-bottom: 16px; color: #1a1a2e; }

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
.grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 16px; margin-bottom: 20px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 20px; }
@media (max-width: 1100px) { .grid-4 { grid-template-columns: repeat(2, 1fr); } }
@media (max-width: 900px) { .grid-2, .grid-3 { grid-template-columns: 1fr; } }

table { width: 100%; border-collapse: collapse; font-size: 13px; }
th { background: #f0f4f8; padding: 10px 12px; text-align: left; font-weight: 700; font-size: 11px; text-transform: uppercase; color: #555; border-bottom: 2px solid #e5e7eb; }
td { padding: 10px 12px; border-bottom: 1px solid #f5f5f5; }
tr:hover td { background: #fafbff; }
tr.total-row td { background: #1a1a2e; color: white; font-weight: 700; }

.badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
.badge-green { background: #d1fae5; color: #065f46; }
.badge-red { background: #fee2e2; color: #991b1b; }
.badge-yellow { background: #fef3c7; color: #92400e; }
.badge-blue { background: #dbeafe; color: #1e40af; }
.badge-gray { background: #f3f4f6; color: #4b5563; }
.badge-purple { background: #ede9fe; color: #5b21b6; }
.badge-teal { background: #ccfbf1; color: #065f46; }

.ret-badge { background: #d1fae5; color: #065f46; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.new-badge { background: #fed7aa; color: #9a3412; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
.vip-badge { background: #ede9fe; color: #5b21b6; font-size: 10px; font-weight: 700; padding: 2px 7px; border-radius: 10px; }
